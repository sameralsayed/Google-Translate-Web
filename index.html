<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Free Google Translate Web - Translate text, voice, photos, and conversations instantly between 100+ languages. Clean, fast, and mobile-friendly translator.">
    <meta name="keywords" content="google translate, online translator, free translation, text translator, voice translator, camera translation, language translator">
    <title>Google Translate - Instant Translator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary" href="#">🌐 Google Translate</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="#translate">Translate</a></li>
                    <li class="nav-item"><a class="nav-link" href="#conversation">Conversation</a></li>
                    <li class="nav-item"><a class="nav-link" href="#phrasebook">Phrasebook</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <!-- Main Translator -->
        <section id="translate" class="mb-5">
            <div class="row">
                <!-- Source -->
                <div class="col-lg-6 mb-4">
                    <div class="card h-100 shadow-sm">
                        <div class="card-header d-flex justify-content-between align-items-center bg-white">
                            <select id="sourceLang" class="form-select border-0 fw-bold"></select>
                            <button id="swapBtn" class="btn btn-light btn-sm"><i class="fas fa-exchange-alt"></i></button>
                        </div>
                        <div class="card-body p-0">
                            <textarea id="sourceText" class="form-control border-0 shadow-none" rows="6" placeholder="Type, speak, or paste text..."></textarea>
                        </div>
                        <div class="card-footer bg-white d-flex justify-content-between">
                            <button id="voiceInputBtn" class="btn btn-light"><i class="fas fa-microphone"></i></button>
                            <button id="clearBtn" class="btn btn-light"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                </div>

                <!-- Target -->
                <div class="col-lg-6">
                    <div class="card h-100 shadow-sm">
                        <div class="card-header bg-white">
                            <select id="targetLang" class="form-select border-0 fw-bold"></select>
                        </div>
                        <div class="card-body p-0">
                            <div id="targetText" class="p-3 min-vh-50 border-0 form-control" style="min-height: 180px; background:#f8f9fa;"></div>
                        </div>
                        <div class="card-footer bg-white d-flex justify-content-between">
                            <button id="speakBtn" class="btn btn-light"><i class="fas fa-volume-up"></i></button>
                            <button id="savePhraseBtn" class="btn btn-light"><i class="fas fa-star"></i> Save</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="text-center mt-4">
                <button id="translateBtn" class="btn btn-primary btn-lg px-5">Translate</button>
            </div>
        </section>

        <!-- Quick Tools -->
        <div class="row g-4 mb-5">
            <div class="col-md-4">
                <div class="card shadow-sm h-100 text-center p-4" onclick="simulateCamera()">
                    <i class="fas fa-camera fa-3x text-primary mb-3"></i>
                    <h5>Camera Translation</h5>
                    <p class="small text-muted">Point camera at text</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card shadow-sm h-100 text-center p-4">
                    <i class="fas fa-image fa-3x text-primary mb-3"></i>
                    <h5>Upload Photo</h5>
                    <input type="file" id="photoInput" accept="image/*" class="d-none">
                    <button onclick="$('#photoInput').click()" class="btn btn-outline-primary">Upload Image</button>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card shadow-sm h-100 text-center p-4" onclick="startConversation()">
                    <i class="fas fa-comments fa-3x text-primary mb-3"></i>
                    <h5>Conversation Mode</h5>
                    <p class="small text-muted">Bilingual chat</p>
                </div>
            </div>
        </div>

        <!-- Conversation Simulation -->
        <section id="conversation" class="mb-5 d-none">
            <h4 class="mb-3">Conversation Mode</h4>
            <div id="convArea" class="border rounded p-3 bg-light" style="height: 300px; overflow-y:auto;"></div>
            <div class="input-group mt-3">
                <input id="convInput" type="text" class="form-control" placeholder="Type message...">
                <button id="sendConvBtn" class="btn btn-primary">Send</button>
            </div>
        </section>

        <!-- Phrasebook -->
        <section id="phrasebook">
            <h4 class="mb-3"><i class="fas fa-book"></i> Phrasebook</h4>
            <div id="phraseList" class="list-group"></div>
        </section>
    </div>

    <footer class="bg-light py-5 border-top">
        <div class="container text-center">
            <p class="mb-1">Made by ♥️ <a href="https://bio.link/samer" target="_blank" class="text-primary fw-bold">SAMER SAEID</a></p>
            <p>Copyright SAMER SAEID © 2026</p>
            <p class="small text-muted">Simulation + real translation • Works offline after loading</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
